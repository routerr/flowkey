<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main flowing design -->
  <g id="flowkey-design">
    <!-- Outer glow/background circle -->
    <circle cx="512" cy="512" r="480" fill="none" stroke="#4CC9F0" stroke-width="20" opacity="0.1"/>
    
    <!-- Flowing line that forms keyboard and mouse -->
    <path d="M256 400 
             C256 280 320 200 420 200 
             C520 200 580 280 580 400
             L580 420
             C580 480 540 520 480 520
             C420 520 380 480 380 420
             L380 400
             Z" 
          fill="none" 
          stroke="#4CC9F0" 
          stroke-width="32" 
          stroke-linejoin="round"
          stroke-linecap="round"/>
    
    <!-- Keyboard key details -->
    <rect x="320" y="240" width="120" height="40" rx="8" fill="#4CC9F0" opacity="0.2"/>
    <rect x="340" y="200" width="80" height="40" rx="6" fill="#4CC9F0" opacity="0.3"/>
    
    <!-- Mouse details -->
    <circle cx="640" cy="580" r="40" fill="#4CC9F0" opacity="0.2"/>
    <circle cx="640" cy="580" r="20" fill="#4CC9F0" opacity="0.4"/>
    <line x1="640" y1="540" x2="640" y2="620" stroke="#4CC9F0" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Flowing connection dots -->
    <circle cx="400" cy="300" r="12" fill="#4CC9F0"/>
    <circle cx="480" cy="300" r="12" fill="#4CC9F0"/>
    <circle cx="560" cy="460" r="12" fill="#4CC9F0"/>
    <circle cx="480" cy="460" r="12" fill="#4CC9F0"/>
  </g>
</svg>
